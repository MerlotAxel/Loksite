<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Loksite — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #f8f9fc;
  --bg2:    #ffffff;
  --border: #e4e7ef;
  --bd2:    #d0d5e8;
  --text:   #111827;
  --t2:     #6b7280;
  --t3:     #9ca3af;
  --pr:     #4f6ef7;
  --pr2:    #3b57e8;
  --prbg:   #eef2ff;
  --red:    #ef4444;
  --r:      11px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  /* Bloquer zoom et scroll indésirable sur mobile */
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}
/* Empêcher le double-tap zoom sur les boutons et inputs */
button, input, a {
  touch-action:manipulation;
}

/* ── LAYOUT ── */
.page {
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
}

/* ════════════════════════════
   FORM PANEL (gauche)
════════════════════════════ */
.form-panel {
  display:flex; flex-direction:column; justify-content:center;
  padding:56px 60px;
  background:var(--bg2);
  border-right:1px solid var(--border);
}

/* Logo */
.logo {
  display:flex; align-items:center; gap:9px;
  margin-bottom:48px;
}
.logo-mark {
  width:34px; height:34px;
  background:var(--pr);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(79,110,247,.25);
}
.logo-mark svg { width:16px; height:16px; }
.logo-name {
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px; font-weight:700;
  letter-spacing:-.02em; color:var(--text);
}

/* Heading */
.form-tag {
  font-size:11px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--pr); margin-bottom:10px;
}
.form-title {
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:26px; font-weight:800;
  letter-spacing:-.04em; line-height:1.15;
  color:var(--text); margin-bottom:7px;
}
.form-sub {
  font-size:13.5px; color:var(--t2);
  line-height:1.65; margin-bottom:30px;
}

/* Error */
.err {
  background:#fef2f2; border:1px solid #fecaca;
  border-radius:var(--r); padding:10px 13px;
  font-size:13px; color:#dc2626;
  margin-bottom:16px;
  display:none; align-items:center; gap:8px;
}
.err.on { display:flex; }
.err svg { width:14px; height:14px; flex-shrink:0; }

/* Fields */
.field { margin-bottom:14px; }
.field-lbl {
  display:block; font-size:12px; font-weight:500;
  color:var(--t2); margin-bottom:6px;
}
.field-wrap { position:relative; display:flex; align-items:center; }
.f-ico {
  position:absolute; left:13px;
  color:var(--t3); pointer-events:none;
  display:flex; align-items:center;
  transition:color .18s;
}
.f-ico svg { width:15px; height:15px; }
.field-wrap:focus-within .f-ico { color:var(--pr); }

.inp {
  width:100%;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:11px 14px 11px 40px;
  font-size:13.5px; font-family:'Inter',sans-serif;
  color:var(--text); outline:none;
  transition:border-color .18s, box-shadow .18s;
}
.inp::placeholder { color:var(--t3); }
.inp:focus {
  border-color:var(--pr);
  box-shadow:0 0 0 3px rgba(79,110,247,.1);
}
.inp-pass { padding-right:42px !important; }

/* Eye */
.eye-btn {
  position:absolute; right:11px;
  top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  color:var(--t3); padding:4px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  transition:all .16s;
}
.eye-btn:hover { color:var(--pr); background:var(--prbg); }
.eye-btn svg { width:15px; height:15px; }

/* CTA */
.cta {
  width:100%; margin-top:8px;
  padding:13px 20px;
  background:var(--pr);
  border:none; border-radius:var(--r);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px; font-weight:700;
  color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 2px 12px rgba(79,110,247,.28);
  transition:background .18s, transform .18s, box-shadow .18s;
}
.cta:hover {
  background:var(--pr2);
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(79,110,247,.38);
}
.cta:active { transform:none; }
.cta:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }

.spin {
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%;
  animation:rot .65s linear infinite; display:none;
}
@keyframes rot { to { transform:rotate(360deg); } }

/* Trust */
.trust {
  margin-top:20px; padding-top:18px;
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:5px;
  font-size:11.5px; color:var(--t3);
}
.trust svg { width:11px; height:11px; }

/* Mobile logo */
.mob-logo {
  display:none; align-items:center; gap:9px; margin-bottom:32px;
}

/* ════════════════════════════
   VISUAL PANEL (droite)
════════════════════════════ */
.visual-panel {
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}

/* The spinning arc — single clean line */
.arc-wrap {
  position:relative;
  width:340px; height:340px;
  display:flex; align-items:center; justify-content:center;
}

/* Static background circle */
.arc-base {
  position:absolute; inset:0;
  border-radius:50%;
  border:1px solid var(--border);
}
/* Second static ring */
.arc-base2 {
  position:absolute;
  inset:44px;
  border-radius:50%;
  border:1px solid var(--bd2);
  opacity:.5;
}

/* The rotating arc SVG */
.arc-svg {
  position:absolute; inset:0;
  animation:spin-arc 6s linear infinite;
}
@keyframes spin-arc {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}

/* Center dot */
.center-dot {
  width:10px; height:10px;
  border-radius:50%;
  background:var(--pr);
  box-shadow:0 0 12px rgba(79,110,247,.35);
  position:relative; z-index:2;
}

/* Caption */
.visual-caption {
  position:absolute; bottom:40px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.vc-label {
  font-size:11px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--t3);
}

/* ── Responsive ── */
@media(max-width:820px) {
  .page { grid-template-columns:1fr; }
  .visual-panel { display:none; }
  .form-panel { padding:44px 28px; border-right:none; justify-content:flex-start; padding-top:56px; }
  .logo { display:none; }
  .mob-logo { display:flex; }
  /* FIX ZOOM iOS — font-size >= 16px empêche le zoom automatique */
  .inp { font-size:16px !important; }
}
@media(min-width:821px) { .mob-logo { display:none; } }
</style>
</head>
<body>

<div class="page">

  <!-- FORM -->
  <div class="form-panel">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="rgba(255,255,255,.95)"/><path d="M12 6l-4 2.5v5L12 16l4-2.5v-5L12 6z" fill="rgba(255,255,255,.22)"/></svg>
      </div>
      <div class="logo-name">Loksite</div>
    </div>

    <div class="mob-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="rgba(255,255,255,.95)"/><path d="M12 6l-4 2.5v5L12 16l4-2.5v-5L12 6z" fill="rgba(255,255,255,.22)"/></svg>
      </div>
      <div class="logo-name">Loksite</div>
    </div>

    <div class="form-tag">Accès plateforme</div>
    <div class="form-title">Bon retour<br>parmi nous.</div>
    <div class="form-sub">Connectez-vous pour accéder à votre espace.</div>

    <div class="err" id="err">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="err-msg"></span>
    </div>

    <div class="field">
      <label class="field-lbl">Adresse email</label>
      <div class="field-wrap">
        <div class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
        <input class="inp" type="email" id="email" placeholder="vous@exemple.fr" autocomplete="email">
      </div>
    </div>

    <div class="field" style="margin-bottom:22px">
      <label class="field-lbl">Mot de passe</label>
      <div class="field-wrap">
        <div class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
        <input class="inp inp-pass" type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" id="eye-btn" type="button" onclick="togglePass()" aria-label="Afficher le mot de passe">
          <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="cta" id="btn" onclick="doLogin()">
      <span id="btn-lbl">Accéder à mon espace</span>
      <div class="spin" id="spin"></div>
    </button>

    <div class="trust">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Connexion sécurisée · Chiffrement SSL
    </div>

  </div>

  <!-- VISUAL -->
  <div class="visual-panel">

    <div class="arc-wrap">
      <!-- Static rings -->
      <div class="arc-base"></div>
      <div class="arc-base2"></div>

      <!-- Rotating arc — 1 seul trait propre -->
      <svg class="arc-svg" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="arc-g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f6ef7" stop-opacity="0"/>
            <stop offset="60%" stop-color="#4f6ef7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#4f6ef7" stop-opacity="1"/>
          </linearGradient>
        </defs>
        <!-- L'arc : un quart de cercle, trait fin, dégradé -->
        <path
          d="M 170 10 A 160 160 0 0 1 330 170"
          fill="none"
          stroke="url(#arc-g)"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <!-- Petit point au bout du trait -->
        <circle cx="330" cy="170" r="3" fill="#4f6ef7"/>
      </svg>

      <!-- Centre -->
      <div class="center-dot"></div>
    </div>

    <div class="visual-caption">
      <div class="vc-label">Plateforme active</div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  'https://qhnofvfgutsdgbfwhupg.supabase.co',
  'sb_publishable_fJ-oHwhpaB0pBRwMgdwFXQ_GY2Ad9GY'
);

function showErr(m){const e=document.getElementById('err');document.getElementById('err-msg').textContent=m;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),5000);}
function setLoad(on){const btn=document.getElementById('btn');document.getElementById('btn-lbl').textContent=on?'Connexion…':'Accéder à mon espace';document.getElementById('spin').style.display=on?'block':'none';btn.disabled=on;}

async function route(uid){
  const{data:p}=await sb.from('profiles').select('role,espace_url').eq('id',uid).single();
  if(!p){showErr('Profil introuvable. Contactez Loksite.');setLoad(false);return;}
  if(p.role==='admin'){window.location.href='loksite-admin.html';return;}
  if(p.espace_url){window.location.href=p.espace_url;return;}
  showErr('Espace introuvable. Contactez Loksite.');setLoad(false);
}

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Veuillez remplir tous les champs.');return;}
  document.getElementById('err').classList.remove('on');
  setLoad(true);
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr('Identifiants incorrects.');setLoad(false);return;}
  await route(data.user.id);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function togglePass(){
  const inp=document.getElementById('pass');
  const off=document.getElementById('eye-off');
  const on=document.getElementById('eye-on');
  const btn=document.getElementById('eye-btn');
  const show=inp.type==='text';
  inp.type=show?'password':'text';
  off.style.display=show?'block':'none';
  on.style.display=show?'none':'block';
  btn.setAttribute('aria-label',show?'Afficher le mot de passe':'Masquer le mot de passe');
  inp.focus();
}

window.addEventListener('load',async()=>{
  try{await sb.auth.signOut();}catch(e){}
  Object.keys(localStorage).forEach(k=>{if(k.startsWith('sb-')||k.includes('supabase'))localStorage.removeItem(k);});
  Object.keys(sessionStorage).forEach(k=>{if(k.startsWith('sb-')||k.includes('supabase'))sessionStorage.removeItem(k);});
  const el=document.getElementById('email');if(el)el.focus();
});
</script>
</body>
</html>
